{% extends 'base.html' %}

{% block content %}

    <div class="container text-center">
        <h1>Lista de Quartos</h1>

        {% for quarto in contex['quartos'] %}
            <div class="row justify-content-md-center p-2">
                <div class="col-md-auto">
                    <div class="card" style="width: 30rem;">
                        <div class="card-header">
                            {{ quarto['id'] }}
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">{{ quarto['Descrição'] }}</h5>
                            
                            <button type="button" class="btn btn-primary" disabled>{{ quarto['Status'] }}</button>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}

    </div>

{% endblock %}
